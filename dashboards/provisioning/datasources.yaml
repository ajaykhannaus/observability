apiVersion: 1

# URL env vars let this file work both locally (docker-compose defaults) and
# in Azure (Container App env vars set by the deploy scripts).
#   PROMETHEUS_URL  default: http://prometheus:9090
#   LOKI_URL        default: http://loki:3100
#   TEMPO_URL       default: http://tempo:3200

datasources:
  - name: Prometheus
    uid: prometheus-ds
    type: prometheus
    access: proxy
    url: ${PROMETHEUS_URL:-http://prometheus:9090}
    isDefault: true
    jsonData:
      timeInterval: 10s
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo-ds
    editable: true

  - name: Loki
    uid: loki-ds
    type: loki
    access: proxy
    url: ${LOKI_URL:-http://loki:3100}
    jsonData:
      derivedFields:
        - datasourceUid: tempo-ds
          matcherRegex: '"trace_id":"([a-f0-9]{32})"'
          name: trace_id
          url: "$${__value.raw}"
          urlDisplayLabel: "Open in Tempo"
    editable: true

  - name: Tempo
    uid: tempo-ds
    type: tempo
    access: proxy
    url: ${TEMPO_URL:-http://tempo:3200}
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki-ds
        filterByTraceID: true
        filterBySpanID: false
        customQuery: false
      tracesToMetrics:
        datasourceUid: prometheus-ds
      serviceMap:
        datasourceUid: prometheus-ds
      lokiSearch:
        datasourceUid: loki-ds
    editable: true
