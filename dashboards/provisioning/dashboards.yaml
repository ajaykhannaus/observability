apiVersion: 1

providers:
  - name: "AI Telemetry Dashboards"
    orgId: 1
    folder: "AI Telemetry"
    folderUid: "ai-telemetry-folder"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
