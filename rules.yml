groups:
  - name: slo_recording_rules
    interval: 1m
    rules:
      # Availability SLI (Request success rate)
      - record: ai_gateway:availability:current
        expr: sum(rate(ai_gateway_request_count_total{status="success"}[5m])) / sum(rate(ai_gateway_request_count_total[5m]))
      
      # Burn rate alerts
      - alert: ErrorRateHigh
        expr: ai_gateway:availability:current < 0.995
        for: 5m
        labels:
          severity: page
          tier: P1
        annotations:
          summary: "High API Error Rate Alert"
          description: "Gateway availability dropped below 99.5% for 5 minutes."

      # ── Pod health ───────────────────────────────────────────────────────
      - record: ai_gateway:pods_running:current
        expr: sum(kube_pod_status_phase{namespace="ai-gateway-ns", phase="Running"})

      - alert: PodRestartingFrequently
        expr: rate(kube_pod_container_status_restarts_total{namespace="ai-gateway-ns"}[15m]) > 0.1
        for: 5m
        labels:
          severity: warning
          tier: P2
        annotations:
          summary: "Pod restarting frequently"
          description: "Pod {{ $labels.pod }} is restarting more than 6 times per hour."
