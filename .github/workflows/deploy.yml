name: Build and Deploy to Azure

# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets (repo → Settings → Secrets → Actions):
#
#   AZURE_CREDENTIALS        SP credentials JSON  (az ad sp create-for-rbac --sdk-auth)
#   AZURE_RESOURCE_GROUP     e.g. rg-ai-telemetry-dev
#   ACR_LOGIN_SERVER         e.g. acrtelemetrydev.azurecr.io
#   AZURE_ACR_NAME           short ACR name only  e.g. acrtelemetrydev
#   ACR_PASSWORD             ACR admin password  (az acr credential show --name <acr>)
#   AZURE_CONTAINER_APP_NAME e.g. ai-telemetry-runner-dev
#   AZURE_CAE_NAME           Container Apps Environment  e.g. cae-telemetry-dev
#
# Optional (jobs 3 & 4 skip gracefully if not set):
#   PROM_REMOTE_WRITE_URL    Azure Managed Prometheus ingestion URL
#   AZURE_GRAFANA_NAME       Azure Managed Grafana resource name
#
# Runner setup:
#   Jobs 1 & 2 run on the company Windows Server VM (self-hosted runner).
#   Jobs 3 & 4 run on GitHub-hosted ubuntu (optional, continue-on-error).
#   See infra/setup-runner.ps1 to register the VM as a runner.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  ACR:            ${{ secrets.ACR_LOGIN_SERVER }}
  ACR_NAME:       ${{ secrets.AZURE_ACR_NAME }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  RUNNER_APP:     ${{ secrets.AZURE_CONTAINER_APP_NAME }}
  CAE_NAME:       ${{ secrets.AZURE_CAE_NAME }}
  PROM_APP:       prometheus-scraper

jobs:
  # ── Job 1: Build + push Azure Functions image ─────────────────────────────
  # Runs on the company Windows Server VM (inside VPN → can reach company Azure)
  build-fn:
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name "${{ env.ACR_NAME }}"

      - name: Build and push Functions image
        run: |
          docker build `
            -t ${{ env.ACR }}/ai-telemetry-fn:${{ github.sha }} `
            -t ${{ env.ACR }}/ai-telemetry-fn:latest `
            .
          docker push ${{ env.ACR }}/ai-telemetry-fn:${{ github.sha }}
          docker push ${{ env.ACR }}/ai-telemetry-fn:latest
        shell: pwsh

  # ── Job 2: Build + push + deploy the telemetry runner ────────────────────
  # Runs on the company Windows Server VM (inside VPN → can reach company Azure)
  build-and-deploy-runner:
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name "${{ env.ACR_NAME }}"

      - name: Enable docker buildx
        run: docker buildx install
        shell: pwsh

      - name: Build and push runner image (linux/amd64)
        run: |
          docker buildx build --platform linux/amd64 `
            -f Dockerfile.runner `
            -t ${{ env.ACR }}/ai-telemetry-runner:${{ github.sha }} `
            -t ${{ env.ACR }}/ai-telemetry-runner:latest `
            --push .
        shell: pwsh

      - name: Install Container Apps CLI extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Render container app YAML
        shell: pwsh
        run: |
          $envId = az containerapp env show `
            --name "${{ env.CAE_NAME }}" `
            --resource-group "${{ env.RESOURCE_GROUP }}" `
            --query id -o tsv
          $image = "${{ env.ACR }}/ai-telemetry-runner:${{ github.sha }}"
          $location = "${{ secrets.AZURE_LOCATION }}"
          (Get-Content infra/containerapp.template.yaml -Raw) `
            -replace '__LOCATION__', $location `
            -replace '__MANAGED_ENV_ID__', $envId `
            -replace '__ACR_LOGIN_SERVER__', "${{ env.ACR }}" `
            -replace '__IMAGE__', $image `
            | Set-Content infra/containerapp.rendered.yaml
          Get-Content infra/containerapp.rendered.yaml

      - name: Sync EventHub secrets onto the Container App
        shell: pwsh
        run: |
          az containerapp secret set `
            --name "${{ env.RUNNER_APP }}" `
            --resource-group "${{ env.RESOURCE_GROUP }}" `
            --secrets `
              "eventhub-namespace=${{ secrets.EVENTHUB_NAMESPACE }}" `
              "eventhub-connection-string=${{ secrets.EVENTHUB_CONNECTION_STRING }}" 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "Secrets will be created with the app." }

      - name: Deploy runner to Azure Container Apps (create-or-update via YAML)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          az containerapp update `
            --name "${{ env.RUNNER_APP }}" `
            --resource-group "${{ env.RESOURCE_GROUP }}" `
            --yaml infra/containerapp.rendered.yaml
          if ($LASTEXITCODE -ne 0) {
            Write-Host "App not found — creating..."
            az containerapp create `
              --name "${{ env.RUNNER_APP }}" `
              --resource-group "${{ env.RESOURCE_GROUP }}" `
              --yaml infra/containerapp.rendered.yaml
            # Grant the system-assigned managed identity AcrPull on the registry
            $appPrincipalId = az containerapp show `
              --name "${{ env.RUNNER_APP }}" `
              --resource-group "${{ env.RESOURCE_GROUP }}" `
              --query identity.principalId -o tsv
            $acrId = az acr show --name "${{ env.ACR_NAME }}" --query id -o tsv
            az role assignment create `
              --assignee "$appPrincipalId" `
              --role AcrPull `
              --scope "$acrId" 2>$null
            # Re-apply YAML now that managed-identity-based pull is allowed
            az containerapp update `
              --name "${{ env.RUNNER_APP }}" `
              --resource-group "${{ env.RESOURCE_GROUP }}" `
              --yaml infra/containerapp.rendered.yaml
          }

  # ── Job 3: Build + push + deploy the Prometheus scraper ──────────────────
  # Runs on GitHub-hosted runner (optional — skips if PROM_REMOTE_WRITE_URL not set)
  build-and-deploy-prometheus:
    runs-on: ubuntu-latest
    needs: build-and-deploy-runner
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Container Apps CLI extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Get runner FQDN
        id: runner_fqdn
        run: |
          FQDN=$(az containerapp show \
            --name "${{ env.RUNNER_APP }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "fqdn=$FQDN" >> $GITHUB_OUTPUT

      - name: Login to ACR
        run: az acr login --name "${{ env.ACR_NAME }}"

      - name: Build and push Prometheus scraper image
        run: |
          docker buildx build --platform linux/amd64 \
            -f Dockerfile.prometheus \
            -t ${{ env.ACR }}/prometheus-scraper:${{ github.sha }} \
            -t ${{ env.ACR }}/prometheus-scraper:latest \
            --push .

      - name: Deploy Prometheus scraper to Azure Container Apps
        run: |
          az containerapp update \
            --name "${{ env.PROM_APP }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ env.ACR }}/prometheus-scraper:${{ github.sha }}" \
            --set-env-vars \
              SCRAPE_TARGET="${{ steps.runner_fqdn.outputs.fqdn }}" \
              PROM_REMOTE_WRITE_URL="${{ secrets.PROM_REMOTE_WRITE_URL }}"

  # ── Job 4: Import dashboard to Azure Managed Grafana ─────────────────────
  deploy-grafana-dashboard:
    runs-on: ubuntu-latest
    needs: build-and-deploy-prometheus
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        if: ${{ secrets.AZURE_CREDENTIALS != '' }}
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Grafana CLI extension
        run: az extension add --name amg --upgrade --yes

      - name: Import dashboard to Azure Managed Grafana
        run: |
          az grafana dashboard import \
            --name "${{ secrets.AZURE_GRAFANA_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --definition @dashboards/grafana_dashboard.json \
            --overwrite true
