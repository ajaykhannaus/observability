name: Build and Deploy to Azure

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  ACR: acrtelemetrypoc.azurecr.io
  RESOURCE_GROUP: rg-ai-telemetry-poc

jobs:
  # ── Job 1: Build and push Azure Functions image (existing path, untouched) ──
  build-fn:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name acrtelemetrypoc

      - name: Build and push Functions image
        run: |
          docker build \
            -t ${{ env.ACR }}/ai-telemetry-fn:${{ github.sha }} \
            -t ${{ env.ACR }}/ai-telemetry-fn:latest \
            .
          docker push ${{ env.ACR }}/ai-telemetry-fn:${{ github.sha }}
          docker push ${{ env.ACR }}/ai-telemetry-fn:latest

  # ── Job 2: Build, push, and deploy the Container Apps runner image ────────
  build-and-deploy-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name acrtelemetrypoc

      - name: Build and push runner image
        run: |
          docker build -f Dockerfile.runner \
            -t ${{ env.ACR }}/ai-telemetry-runner:${{ github.sha }} \
            -t ${{ env.ACR }}/ai-telemetry-runner:latest \
            .
          docker push ${{ env.ACR }}/ai-telemetry-runner:${{ github.sha }}
          docker push ${{ env.ACR }}/ai-telemetry-runner:latest

      - name: Install Container Apps CLI extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR }}/ai-telemetry-runner:${{ github.sha }}
