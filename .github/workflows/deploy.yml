name: Build and Deploy to Azure

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  ACR:            acrtelemetrypoc.azurecr.io
  RESOURCE_GROUP: rg-ai-telemetry-poc
  RUNNER_APP:     ${{ secrets.AZURE_CONTAINER_APP_NAME }}   # ai-telemetry-runner
  PROM_APP:       prometheus-scraper

jobs:
  # ── Job 1: Build + push Azure Functions image (existing path) ─────────────
  build-fn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name acrtelemetrypoc

      - name: Build and push Functions image
        run: |
          docker build \
            -t ${{ env.ACR }}/ai-telemetry-fn:${{ github.sha }} \
            -t ${{ env.ACR }}/ai-telemetry-fn:latest \
            .
          docker push ${{ env.ACR }}/ai-telemetry-fn:${{ github.sha }}
          docker push ${{ env.ACR }}/ai-telemetry-fn:latest

  # ── Job 2: Build + push + deploy the telemetry runner ────────────────────
  build-and-deploy-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name acrtelemetrypoc

      - name: Build and push runner image (linux/amd64)
        run: |
          docker buildx build --platform linux/amd64 \
            -f Dockerfile.runner \
            -t ${{ env.ACR }}/ai-telemetry-runner:${{ github.sha }} \
            -t ${{ env.ACR }}/ai-telemetry-runner:latest \
            --push .

      - name: Install Container Apps CLI extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Deploy runner to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ env.RUNNER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR }}/ai-telemetry-runner:${{ github.sha }}

  # ── Job 3: Build + push + deploy the Prometheus scraper ──────────────────
  build-and-deploy-prometheus:
    runs-on: ubuntu-latest
    needs: build-and-deploy-runner      # get runner FQDN after it's updated
    continue-on-error: true            # skip gracefully if PROM secrets not yet set
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Container Apps CLI extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Get runner FQDN
        id: runner_fqdn
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.RUNNER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "fqdn=$FQDN" >> $GITHUB_OUTPUT

      - name: Login to ACR
        run: az acr login --name acrtelemetrypoc

      - name: Build and push Prometheus scraper image
        run: |
          docker buildx build --platform linux/amd64 \
            -f Dockerfile.prometheus \
            -t ${{ env.ACR }}/prometheus-scraper:${{ github.sha }} \
            -t ${{ env.ACR }}/prometheus-scraper:latest \
            --push .

      - name: Deploy Prometheus scraper to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ env.PROM_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR }}/prometheus-scraper:${{ github.sha }} \
            --set-env-vars \
              SCRAPE_TARGET="${{ steps.runner_fqdn.outputs.fqdn }}" \
              PROM_REMOTE_WRITE_URL="${{ secrets.PROM_REMOTE_WRITE_URL }}"

  # ── Job 4: Import dashboard to Azure Managed Grafana ─────────────────────
  deploy-grafana-dashboard:
    runs-on: ubuntu-latest
    needs: build-and-deploy-prometheus
    continue-on-error: true            # skip gracefully if AZURE_GRAFANA_NAME not yet set
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Grafana CLI extension
        run: az extension add --name amg --upgrade --yes

      - name: Import dashboard to Azure Managed Grafana
        run: |
          az grafana dashboard import \
            --name ${{ secrets.AZURE_GRAFANA_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --definition @dashboards/grafana_dashboard.json \
            --overwrite true
