global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - "rules.yml"

scrape_configs:
  - job_name: ai-telemetry-poc
    static_configs:
      - targets: ["localhost:8000"]
    metrics_path: /metrics

  - job_name: 'kube-state-metrics-simulator'
    static_configs:
      - targets: ['localhost:8080']
