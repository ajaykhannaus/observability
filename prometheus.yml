global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    service: ai-telemetry
    environment: prod

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  # ── Runner sidecar /metrics (legacy direct-scrape path; kept as a
  #    fallback for in-cluster Prometheus scrapers that prefer pull mode).
  - job_name: ai-telemetry-runner
    static_configs:
      - targets: ["__SCRAPE_TARGET__"]
    scheme: https
    metrics_path: /metrics

  # ── OTel Collector self-metrics (Bucket 1 — observe the observer).
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
    scheme: http
    metrics_path: /metrics

# ── Push to Azure Managed Prometheus ─────────────────────────────────────────
# In Bucket 1 the primary metric path is OTLP → Collector → Prometheus inside
# the cluster. This remote_write block is retained for customers who still
# fan out to Azure Managed Prometheus.
remote_write:
  - url: "__REMOTE_WRITE_URL__"
    name: azure-managed-prometheus
    authorization:
      type: Bearer
      credentials_file: /tmp/azure_prom_write_token.txt
    queue_config:
      max_shards: 4
      max_samples_per_send: 1000
      batch_send_deadline: 10s
    metadata_config:
      send: true
      send_interval: 1m
