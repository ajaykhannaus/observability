global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: ai-telemetry-poc
    static_configs:
      # LOCAL DEV (Mac/Windows):
      #   Set this to your Container App FQDN after deploying.
      #   Example: ai-telemetry-runner.salmonpond-33c4abff.eastus.azurecontainerapps.io
      #
      # COMPANY AZURE (Prometheus Container App):
      #   The entrypoint script replaces __SCRAPE_TARGET__ with the
      #   SCRAPE_TARGET environment variable set on the Container App.
      - targets: ["__SCRAPE_TARGET__"]
    scheme: https
    metrics_path: /metrics

# ── Push to Azure Managed Prometheus ─────────────────────────────────────────
# LOCAL DEV:  Token is written to /tmp/azure_prom_write_token.txt
#             by scripts/refresh_azure_auth.py (run manually on your machine).
#
# COMPANY AZURE (Prometheus Container App):
#   The Container App uses a Managed Identity — the token is fetched
#   automatically via IMDS. __REMOTE_WRITE_URL__ is replaced at startup
#   by the PROM_REMOTE_WRITE_URL environment variable.
#
remote_write:
  - url: "__REMOTE_WRITE_URL__"
    name: azure-managed-prometheus
    authorization:
      type: Bearer
      # LOCAL DEV only — Managed Identity auth is handled by the entrypoint
      # script in the company Azure deployment (no credentials_file needed).
      credentials_file: /tmp/azure_prom_write_token.txt
    queue_config:
      max_shards: 4
      max_samples_per_send: 1000
      batch_send_deadline: 10s
    metadata_config:
      send: true
      send_interval: 1m
