[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"

[tool.ruff]
line-length = 110
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = [
    "E501",   # line length is enforced separately
    "B008",   # function calls in argument defaults (used by FastAPI-style patterns)
    "UP007",  # X | Y syntax is fine on 3.11
    "UP017",  # datetime.UTC alias — legacy code still uses timezone.utc
    "SIM102", # nested ifs are sometimes more readable
    "SIM105", # contextlib.suppress style — try/except/pass is fine
    "SIM108", # ternary operator preference — if/else more readable in this context
    "F401",   # unused imports in __init__ are intentional re-exports
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "B011", "F401"]
