# Container Apps deployment template for self-hosted Grafana.
# Applied by scripts/bootstrap-azure.sh and .github/workflows/deploy.yml.
#
# Placeholders surrounded by __DOUBLE_UNDERSCORES__ are substituted at
# deploy time (see scripts/bootstrap-azure.sh deploy_grafana()).
#
# Grafana reads datasource URLs from env vars baked into the image via
# dashboards/provisioning/datasources.yaml (${PROMETHEUS_URL:-...} etc).
location: __LOCATION__
properties:
  managedEnvironmentId: __MANAGED_ENV_ID__
  configuration:
    activeRevisionsMode: Single
    ingress:
      external: true
      targetPort: 3000
      transport: auto
      allowInsecure: false
    registries:
      - server: __ACR_LOGIN_SERVER__
        identity: system
    secrets:
      - name: grafana-admin-password
        value: __GRAFANA_ADMIN_PASSWORD__
  template:
    containers:
      - name: grafana
        image: __IMAGE__
        resources:
          cpu: 0.5
          memory: 1Gi
        env:
          - name: GF_SECURITY_ADMIN_PASSWORD
            secretRef: grafana-admin-password
          - name: GF_AUTH_ANONYMOUS_ENABLED
            value: "false"
          - name: GF_USERS_ALLOW_SIGN_UP
            value: "false"
          - name: GF_USERS_DEFAULT_THEME
            value: light
          - name: GF_SERVER_ROOT_URL
            value: "%(protocol)s://%(domain)s/"
          - name: PROMETHEUS_URL
            value: __PROMETHEUS_URL__
    scale:
      minReplicas: 1
      maxReplicas: 1
identity:
  type: SystemAssigned
