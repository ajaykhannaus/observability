# Grafana Container App — Bucket 1.
# Provisions datasources for Prometheus, Tempo, Loki via mounted config files
# (those configs land in this image in a follow-up commit; the template
# captures the Container App shape).
location: __LOCATION__
properties:
  managedEnvironmentId: __MANAGED_ENV_ID__
  configuration:
    activeRevisionsMode: Single
    ingress:
      external: true
      targetPort: 3000
      transport: http
      allowInsecure: false
    secrets:
      - name: grafana-admin-password
        value: __GRAFANA_ADMIN_PASSWORD__
    registries: []
  template:
    containers:
      - name: grafana
        image: grafana/grafana:11.3.0
        resources:
          cpu: 0.5
          memory: 1Gi
        env:
          - name: GF_SECURITY_ADMIN_PASSWORD
            secretRef: grafana-admin-password
          - name: GF_AUTH_ANONYMOUS_ENABLED
            value: "false"
          - name: GF_USERS_ALLOW_SIGN_UP
            value: "false"
          - name: GF_USERS_DEFAULT_THEME
            value: light
          # Tenant template variable default — read from a JWT claim if
          # fronting auth (Azure AD / APIM) injects it; otherwise empty,
          # which the dashboards interpret as "all tenants".
          - name: GF_AUTH_JWT_ENABLED
            value: "false"
        probes:
          - type: Liveness
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
    scale:
      minReplicas: 1
      maxReplicas: 1
identity:
  type: SystemAssigned
